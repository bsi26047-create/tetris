<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>&#12486;&#12488;&#12522;&#12473;</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" aria-label="Tetris">
    <section class="game-shell">
      <section class="home-screen" id="homeScreen" aria-label="Home">
        <div class="home-brand">
          <p class="eyebrow">BLOCK PUZZLE</p>
          <h1>&#12486;&#12488;&#12522;&#12473;</h1>
        </div>
        <div class="home-actions">
          <button class="primary-button" id="singlePlayButton" type="button">
            &#12471;&#12531;&#12464;&#12523;&#12503;&#12524;&#12452;
          </button>
          <button class="secondary-button" id="settingsButton" type="button">
            &#35373;&#23450;
          </button>
        </div>
      </section>

      <section class="settings-screen" id="settingsScreen" aria-label="Settings" hidden>
        <header class="settings-header">
          <div>
            <p class="eyebrow">SETTINGS</p>
            <h1>&#35373;&#23450;</h1>
          </div>
          <button class="icon-button" id="settingsBackButton" type="button" aria-label="Back" title="Back">
            <span aria-hidden="true">&#8592;</span>
          </button>
        </header>

        <div class="settings-list">
          <label class="setting-row">
            <span class="setting-copy">
              <strong>BGM</strong>
              <span>&#12458;&#12531; / &#12458;&#12501;</span>
            </span>
            <span class="toggle-control">
              <input id="bgmToggle" type="checkbox" checked />
              <span class="toggle-track" aria-hidden="true"></span>
            </span>
          </label>

          <label class="setting-row">
            <span class="setting-copy">
              <strong>&#38899;&#37327;</strong>
              <span id="bgmVolumeValue">36%</span>
            </span>
            <input class="range-control" id="bgmVolume" type="range" min="0" max="100" step="1" value="36" />
          </label>
        </div>
      </section>

      <div class="game-screen" id="gameScreen" hidden>
        <header class="topbar">
          <div class="title-block">
            <p class="eyebrow">BLOCK PUZZLE</p>
            <h1>&#12486;&#12488;&#12522;&#12473;</h1>
          </div>
          <div class="toolbar" aria-label="Game controls">
            <button class="icon-button" id="startButton" type="button" aria-label="Pause or resume" title="Pause / Resume">
              <span id="startIcon" aria-hidden="true">II</span>
            </button>
            <button class="icon-button" id="resetButton" type="button" aria-label="Reset" title="Reset">
              <span aria-hidden="true">R</span>
            </button>
          </div>
        </header>

        <div class="scoreboard" aria-label="Score">
          <div>
            <span>SCORE</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>LEVEL</span>
            <strong id="level">1</strong>
          </div>
          <div>
            <span>LINES</span>
            <strong id="lines">0</strong>
          </div>
        </div>

        <div class="play-area">
          <aside class="side-panel side-panel-hold">
            <span class="panel-label">HOLD</span>
            <canvas id="hold" width="112" height="112" aria-label="Hold piece"></canvas>
          </aside>

          <div class="board-wrap">
            <canvas id="tetris" width="300" height="600" aria-label="Tetris board"></canvas>
            <div class="board-overlay" id="boardOverlay" hidden>
              <strong id="overlayTitle">PAUSED</strong>
              <button id="overlayButton" type="button">RESUME</button>
            </div>
          </div>

          <aside class="side-panel side-panel-next">
            <span class="panel-label">NEXT</span>
            <canvas id="next" width="112" height="112" aria-label="Next piece"></canvas>
          </aside>
        </div>

        <div class="touch-controls" aria-label="Touch controls">
          <div class="touch-row action-row">
            <button type="button" data-action="hold" aria-label="Hold" title="Hold">
              <span class="button-main">HOLD</span>
              <span class="button-sub">KEEP</span>
            </button>
            <button type="button" data-action="rotate" aria-label="Rotate" title="Rotate">
              <span class="button-main">&#8635;</span>
              <span class="button-sub">TURN</span>
            </button>
            <button type="button" data-action="drop" aria-label="Hard drop" title="Hard drop">
              <span class="button-main">&#8659;</span>
              <span class="button-sub">DROP</span>
            </button>
          </div>
          <div class="touch-row move-row">
            <button type="button" data-action="left" aria-label="Move left" title="Move left">
              <span class="button-main">&#8592;</span>
            </button>
            <button type="button" data-action="down" aria-label="Soft drop" title="Soft drop">
              <span class="button-main">&#8595;</span>
            </button>
            <button type="button" data-action="right" aria-label="Move right" title="Move right">
              <span class="button-main">&#8594;</span>
            </button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <audio id="bgm" src="assets/audio/soft_grid_loop_78bpm.ogg" preload="auto" loop></audio>
  <script src="script.js"></script>
</body>
</html>
